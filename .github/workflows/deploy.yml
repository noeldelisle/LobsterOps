name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/**'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}'

      - uses: 'docker/login-action@v3'
        with:
          registry: 'ghcr.io'
          username: '${{ github.actor }}'
          password: '${{ secrets.GITHUB_TOKEN }}'

      - name: Build and push
        run: |
          docker build -t ghcr.io/noeldelisle/lobsterops-dashboard:$GITHUB_SHA .
          docker push ghcr.io/noeldelisle/lobsterops-dashboard:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy lobsterops-dashboard \
            --image ghcr.io/noeldelisle/lobsterops-dashboard:$GITHUB_SHA \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --set-secrets SUPABASE_KEY=supabase-key:latest
